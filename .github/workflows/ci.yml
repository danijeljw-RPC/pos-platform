name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # The service health check proves connectivity only. A new Actions database is empty, so the
    # migration step and integration tests must share this connection string.
    env:
      ConnectionStrings__DaxaDb: "Host=localhost;Port=5432;Database=daxapos;Username=daxapos;Password=daxapos_dev_password"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: daxapos
          POSTGRES_USER: daxapos
          POSTGRES_PASSWORD: daxapos_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U daxapos -d daxapos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore DaxaPos.sln

      - name: Build
        run: dotnet build DaxaPos.sln --no-restore --configuration Release

      # API tests query migrated tables and migration-seeded RBAC data. Apply every migration
      # explicitly instead of relying on a developer database that may already have the schema.
      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef --version 10.0.9

      - name: Apply database migrations
        run: >-
          "$HOME/.dotnet/tools/dotnet-ef" database update
          --project src/DaxaPos.Persistence/DaxaPos.Persistence.csproj
          --startup-project src/DaxaPos.Api/DaxaPos.Api.csproj

      # Run server-side tests (unit + DB-backed API tests) separately from the Blazor bUnit
      # tests below. DaxaPos.Api.Tests has hundreds of Postgres-backed tests; running it
      # concurrently with Web.Tests' bUnit renders starves the 2-vCPU runner and makes the
      # bUnit WaitForAssertion timeouts flaky.
      - name: Test (server)
        run: |
          dotnet test tests/DaxaPos.UnitTests/DaxaPos.UnitTests.csproj --no-build --configuration Release
          dotnet test tests/DaxaPos.Api.Tests/DaxaPos.Api.Tests.csproj --no-build --configuration Release

      - name: Test (web)
        run: dotnet test tests/DaxaPos.Web.Tests/DaxaPos.Web.Tests.csproj --no-build --configuration Release
