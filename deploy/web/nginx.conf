# PLAN-0010 — serves the published Blazor WebAssembly standalone PWA (DaxaPos.Web) as static
# files. `try_files ... /index.html` gives the client-side Router a fallback for any deep-linked
# route (e.g. a refresh on /login). nginx's default mime.types already maps .wasm to
# application/wasm (verified against nginx:1.27-alpine), so it is not redeclared here — a nested
# `types {}` block would replace, not extend, the inherited map and break every other file type.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
